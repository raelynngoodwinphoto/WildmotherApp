<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Wild Mother Tarot</title>
    <link rel="stylesheet" href="css/auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>Wild Mother Tarot</h1>
            <p>Create your account</p>
        </div>

        <div id="message" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
                <p class="password-requirements">Must be at least 6 characters</p>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm your password"
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
        </form>

        <p class="auth-link">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous messages
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage('message', 'Passwords do not match', 'error');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                showMessage('message', 'Password must be at least 6 characters', 'error');
                return;
            }

            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            // Call register function from auth.js
            const result = await register(email, password);

            if (result.success) {
                showMessage('message', 'Account created successfully! Redirecting to login...', 'success');
                form.reset();

                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html?registered=true';
                }, 2000);
            } else {
                showMessage('message', result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
