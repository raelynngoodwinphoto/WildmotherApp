<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Card Reading</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Menu Button -->
        <button id="menu-toggle" class="menu-toggle">☰ Menu</button>

        <!-- Menu Overlay -->
        <div id="menu-overlay" class="menu-overlay hidden">
            <div class="menu-content">
                <button id="menu-close" class="menu-close">✕</button>

                <h2 class="menu-title">Wild Mother Tarot</h2>

                <!-- User Info in Menu -->
                <div class="menu-user-info">
                    <span id="menuUserEmail" class="menu-user-email"></span>
                </div>

                <!-- Menu Buttons -->
                <div class="menu-buttons">
                    <button id="menu-home" class="menu-btn">
                        <span class="menu-btn-icon">🏠</span>
                        <span class="menu-btn-text">Home</span>
                    </button>

                    <button id="menu-journal" class="menu-btn">
                        <span class="menu-btn-icon">📖</span>
                        <span class="menu-btn-text">Journal</span>
                    </button>

                    <button id="menu-explore" class="menu-btn">
                        <span class="menu-btn-icon">✨</span>
                        <span class="menu-btn-text">Visit Website</span>
                    </button>

                    <button id="logoutBtn" class="menu-btn menu-btn-logout">
                        <span class="menu-btn-icon">🚪</span>
                        <span class="menu-btn-text">Sign Out</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Home Page -->
        <div id="home-page" class="home-page">
            <div class="home-header">
                <img src="Examples/BloodHoneyLogo.png" alt="Blood & Honey Collective" class="home-logo">
                <h2 class="home-subtitle">presents</h2>
                <h1 class="home-main-title">Wildmother Tarot</h1>
            </div>

            <div class="home-options">
                <button id="home-readings" class="home-option-btn">
                    <div class="home-option-icon">
                        <img src="Examples/ReadingsButton.png" alt="Ask The Cards" class="icon-image">
                    </div>
                    <h3 class="home-option-title">Ask The Cards</h3>
                    <p class="home-option-desc">Ask a question. Pull a card. Receive insight.</p>
                </button>

                <button id="home-journal" class="home-option-btn">
                    <div class="home-option-icon">
                        <img src="Examples/JournalButton.png" alt="Journal" class="icon-image">
                    </div>
                    <h3 class="home-option-title">Your Journal</h3>
                    <p class="home-option-desc">Reflect, record, remember.</p>
                </button>

                <button id="home-card-of-day" class="home-option-btn">
                    <div class="home-option-icon">
                        <img src="Examples/CardOfTheDayButton.png" alt="Daily Insight" class="icon-image">
                    </div>
                    <h3 class="home-option-title">Daily Insight</h3>
                    <p class="home-option-desc">No question needed. Just receive.</p>
                </button>

                <button id="home-website" class="home-option-btn">
                    <div class="home-option-icon">
                        <img src="Examples/VisitOurWebsite.png" alt="Visit Our Website" class="icon-image">
                    </div>
                    <h3 class="home-option-title">Visit Our Website</h3>
                    <p class="home-option-desc">Your path continues beyond the cards.</p>
                </button>
            </div>
        </div>

        <!-- Spread Selection -->
        <div id="spread-selection" class="spread-selection hidden">
            <h2 class="spread-title">Choose Your Reading</h2>

            <!-- Question Prompt Section -->
            <div class="spread-question-section">
                <label for="reading-question" class="spread-question-label">What guidance do you seek?</label>
                <textarea
                    id="reading-question"
                    class="spread-question-input"
                    placeholder="Enter your question (optional)"
                    rows="2"></textarea>
            </div>

            <div class="button-group">
                <button id="one-card-btn" class="spread-btn-img">
                    <img src="cards/images/wildmother_tarot_one.png" alt="One Card Spread">
                </button>
                <button id="three-card-btn" class="spread-btn-img">
                    <img src="cards/images/wildmother_tarot_3card.png" alt="Three Card Spread">
                </button>
            </div>
        </div>

        <!-- Card Display Area -->
        <div id="card-area" class="card-area hidden">
            <div id="position-labels" class="position-labels"></div>
            <div id="cards-container" class="cards-container"></div>
        </div>

        <!-- Reading Display -->
        <div id="reading-area" class="reading-area hidden">
            <!-- Question Display -->
            <div id="question-display" class="question-display hidden">
                <h3>Your Question</h3>
                <p id="question-text"></p>
            </div>

            <div class="reading-container">
                <div class="reading-column">
                    <h2>Your Reading</h2>
                    <div id="card-descriptions" class="card-descriptions"></div>
                </div>

                <!-- Reflections Section -->
                <div class="reflections-column">
                    <h2>Your Reflections</h2>
                    <textarea
                        id="reflections-textarea"
                        class="reflections-textarea"
                        placeholder="What thoughts, feelings, or insights does this reading bring up for you? Take a moment to reflect..."
                        rows="6"></textarea>
                </div>
            </div>
        </div>

        <!-- Reset Button -->
        <div id="reset-container" class="reset-container hidden">
            <button id="reset-btn" class="reset-btn">New Reading</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Display logged-in user in menu
        const user = getUserFromToken();
        if (user && user.email) {
            document.getElementById('menuUserEmail').textContent = user.email;
        }
    </script>
</body>
</html>
